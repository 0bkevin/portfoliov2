<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Scholar statistics and chat club tracking portal</title>
  <desc id="desc">A recreated scholar-facing portal with statistics cards, monthly trend chart, goal progress, and chat club records.</desc>
  <rect width="1600" height="900" fill="#fff"/>
  <g font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <text x="40" y="102" font-size="36" font-weight="900" fill="#111827">Panel de Estadísticas</text>
    <text x="40" y="134" font-size="18" fill="#667085">Análisis completo de tu participación en el programa ProExcelencia</text>
    <rect x="1240" y="18" width="86" height="34" rx="17" fill="#dcfce7"/><circle cx="1262" cy="35" r="5" fill="#86efac"/><text x="1278" y="41" fill="#166534" font-size="14" font-weight="700">Regular</text>
    <rect x="40" y="178" width="1520" height="38" rx="6" fill="#fff6c7"/><rect x="40" y="178" width="4" height="38" fill="#f7b500"/><text x="58" y="203" fill="#b77900" font-size="16"><tspan font-weight="800">Página experimental:</tspan> la información y el diseño de esta página pueden cambiar en los próximos meses.</text>
    <text x="40" y="270" font-size="28" font-weight="900" fill="#111827">Resumen General</text>
    <g fill="#fff">
      <rect x="40" y="304" width="360" height="160" rx="12" fill="#6366f1"/><text x="66" y="346" font-size="17" font-weight="800">TOTAL ACTIVIDADES</text><text x="66" y="404" font-size="52" font-weight="900">0</text><text x="66" y="438" font-size="17">De 0 registradas</text>
      <rect x="420" y="304" width="360" height="160" rx="12" fill="#a855f7"/><text x="446" y="346" font-size="17" font-weight="800">PROGRESO GENERAL</text><text x="446" y="404" font-size="52" font-weight="900">0%</text><rect x="446" y="424" width="310" height="10" rx="5" fill="#d8b4fe"/>
      <rect x="800" y="304" width="360" height="160" rx="12" fill="#f59e0b"/><text x="826" y="346" font-size="17" font-weight="800">MESES ACTIVOS</text><text x="826" y="404" font-size="52" font-weight="900">0</text><text x="826" y="438" font-size="17">Constancia en tu participación</text>
      <rect x="1180" y="304" width="380" height="160" rx="12" fill="#06a7bd"/><text x="1206" y="346" font-size="17" font-weight="800">MODALIDAD PREFERIDA</text><text x="1206" y="404" font-size="36" font-weight="900">Presencial</text><text x="1206" y="438" font-size="17">0 actividades analizadas</text>
    </g>
    <rect x="40" y="490" width="1520" height="286" rx="10" fill="#fff" stroke="#e5e7eb"/>
    <text x="66" y="538" font-size="22" font-weight="900" fill="#111827">Tendencia Mensual de Actividades</text>
    <g stroke="#e5e7eb"><path d="M90 710h1420M90 675h1420M90 640h1420M90 605h1420"/></g>
    <path d="M90 710h1420" stroke="#14b8a6" stroke-width="6"/>
    <g fill="#535b66" font-size="14" text-anchor="middle">
      <text x="90" y="745">ENE</text><text x="230" y="745">FEB</text><text x="370" y="745">MAR</text><text x="510" y="745">ABR</text><text x="650" y="745">MAY</text><text x="790" y="745">JUN</text><text x="930" y="745">JUL</text><text x="1070" y="745">AGO</text><text x="1210" y="745">SEPT</text><text x="1350" y="745">OCT</text><text x="1490" y="745">DIC</text>
    </g>
    <rect x="40" y="805" width="1520" height="68" rx="10" fill="#fff" stroke="#e5e7eb"/>
    <text x="66" y="842" font-size="20" font-weight="900" fill="#111827">Progreso por Meta</text>
    <g fill="#475467" font-size="14" font-weight="700">
      <text x="260" y="850">Chats</text><text x="490" y="850">0 / 10</text><text x="620" y="850">Talleres</text><text x="1020" y="850">0 / 10</text><text x="1160" y="850">Voluntariado</text><text x="1480" y="850">0h / 100h</text>
    </g>
  </g>
</svg>
