<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Kevin Bravo — Product, Backend, Infrastructure, and Full-Stack Engineer</title>
  <desc id="desc">Social preview for Kevin Bravo's engineering portfolio, featuring a compact portrait and his focus on product engineering, backend systems, infrastructure, AI tooling, and full-stack delivery.</desc>
  <defs>
    <linearGradient id="field" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#090909"/>
      <stop offset="0.58" stop-color="#11100e"/>
      <stop offset="1" stop-color="#1d1409"/>
    </linearGradient>
    <radialGradient id="amberGlow" cx="0.82" cy="0.42" r="0.58">
      <stop offset="0" stop-color="#f59e0b" stop-opacity="0.28"/>
      <stop offset="0.52" stop-color="#d97706" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#d97706" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="portraitShade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0.55" stop-color="#090909" stop-opacity="0"/>
      <stop offset="1" stop-color="#090909" stop-opacity="0.46"/>
    </linearGradient>
    <linearGradient id="amberLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#d97706"/>
    </linearGradient>
    <clipPath id="portraitClip">
      <path d="M990 170C1055 168 1109 222 1112 288C1115 355 1061 426 991 429C922 432 866 374 868 303C870 232 923 172 990 170Z"/>
    </clipPath>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" seed="7" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="24" stdDeviation="26" flood-color="#000000" flood-opacity="0.46"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#field)"/>
  <rect width="1200" height="630" fill="url(#amberGlow)"/>
  <rect width="1200" height="630" filter="url(#grain)" opacity="0.035" style="mix-blend-mode:screen"/>

  <!-- Fine engineering grid -->
  <g stroke="#ffffff" stroke-opacity="0.035" stroke-width="1">
    <path d="M0 126H1200M0 252H1200M0 378H1200M0 504H1200"/>
    <path d="M120 0V630M360 0V630M600 0V630M840 0V630M1080 0V630"/>
  </g>

  <!-- Portrait orbit, borrowed from the site's hero language -->
  <g fill="none" stroke="#f59e0b">
    <circle cx="990" cy="299" r="162" stroke-opacity="0.11" stroke-width="1.2"/>
    <circle cx="990" cy="299" r="138" stroke-opacity="0.15" stroke-width="1" stroke-dasharray="7 11"/>
    <circle cx="1116" cy="228" r="4.5" fill="#fbbf24" stroke="none"/>
    <circle cx="870" cy="356" r="3.2" fill="#d97706" stroke="none"/>
  </g>

  <!-- Compact identity mark: the same KB wordmark used in the navbar -->
  <g font-family="Inter, Helvetica Neue, Arial, sans-serif">
    <text x="76" y="99" fill="#fafafa" font-size="31" font-weight="800" letter-spacing="-1.4">KB</text>
    <rect x="76" y="109" width="44" height="3" rx="1.5" fill="#d97706"/>
    <text x="144" y="88" fill="#fafafa" font-size="20" font-weight="700" letter-spacing="-0.3">Kevin Bravo</text>
    <text x="144" y="108" fill="#a3a3a3" font-size="11" font-weight="600" letter-spacing="1.8">KEVINBRAVO.COM</text>
  </g>

  <!-- Professional positioning -->
  <g font-family="Inter, Helvetica Neue, Arial, sans-serif">
    <text x="76" y="232" fill="#fafafa" font-size="61" font-weight="800" letter-spacing="-2.2">Product, Backend &amp;</text>
    <text x="76" y="296" fill="#fafafa" font-size="61" font-weight="800" letter-spacing="-2.2">Full-Stack Engineer</text>
    <text x="79" y="338" fill="#fbbf24" font-size="17" font-weight="650" letter-spacing="0.2">Infrastructure · AI Agent Tooling · Reliable Systems</text>
    <text x="79" y="394" fill="#c8c8c8" font-size="19" font-weight="400" letter-spacing="-0.1">I turn messy product and operations problems into backend platforms,</text>
    <text x="79" y="424" fill="#c8c8c8" font-size="19" font-weight="400" letter-spacing="-0.1">AI tooling, and full-stack software that teams can trust, ship, and scale.</text>
  </g>

  <!-- Technical focus and working style -->
  <g font-family="Inter, Helvetica Neue, Arial, sans-serif">
    <text x="76" y="482" fill="#a3a3a3" font-size="11" font-weight="700" letter-spacing="2.1">HIGH OWNERSHIP · FULL AGENCY</text>
    <rect x="76" y="499" width="614" height="1.5" fill="url(#amberLine)" opacity="0.72"/>
    <text x="76" y="536" fill="#e5e5e5" font-size="13" font-weight="700" letter-spacing="0.65"><tspan>BACKEND ARCHITECTURE</tspan><tspan dx="14" fill="#d97706" letter-spacing="0">•</tspan><tspan dx="14">INFRASTRUCTURE</tspan><tspan dx="14" fill="#d97706" letter-spacing="0">•</tspan><tspan dx="14">DEV TOOLING</tspan><tspan dx="14" fill="#d97706" letter-spacing="0">•</tspan><tspan dx="14">FULL-STACK DELIVERY</tspan></text>
  </g>

  <!-- Portrait -->
  <g clip-path="url(#portraitClip)" filter="url(#shadow)">
    <rect x="860" y="160" width="260" height="280" fill="#171717"/>
    <image href="main_photo.avif" x="860" y="160" width="260" height="280" preserveAspectRatio="xMidYMid slice"/>
    <rect x="860" y="160" width="260" height="280" fill="url(#portraitShade)"/>
  </g>
  <path d="M990 170C1055 168 1109 222 1112 288C1115 355 1061 426 991 429C922 432 866 374 868 303C870 232 923 172 990 170Z" fill="none" stroke="#fbbf24" stroke-opacity="0.38" stroke-width="1.4"/>
</svg>
